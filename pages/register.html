<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>form handling</title>
<link rel="stylesheet" type="text/css" href="format.css">
</head>

<body>
<section>
<div class="container">
<div class="login-container">
<form id="form1" name="form1" method="post" action="member.php" enctype="multipart/form-data">
  <table width="51%" border="0" align="center" cellpadding="0" cellspacing="0">
    <tr>
      <td colspan="3">PLEASE FILL THE FORM BELOW</td>
    </tr>
    <tr>
      <td width="30%">&nbsp;</td>
      <td colspan="2">&nbsp;</td>
    </tr>
    <tr>
      <td>Name:</td>
      <td colspan="2"><label>
        <input type="text" name="name" id="name" />
      </label></td>
    </tr>
    <tr>
      <td>Email</td>
      <td colspan="2"><label>
        <input type="email" name="email" id="email" />
      </label></td>
    </tr>
    <tr>
      <td>Phone Number:</td>
      <td colspan="2"><label>
        <input type="number" name="phone" id="phone" />
      </label></td>
    </tr>
	 <tr>
      <td>Gender:</td>
      <td colspan="2"><label>
        <input type="radio" name="gender" id="radio" value="female" />
      FEMALE 
      <input type="radio" name="gender" id="radio2" value="male" />
      MALE</label></td>
    </tr>
    <tr>
      <td>Username:</td>
      <td colspan="2"><label>
        <input type="text" name="username" id="username" />
      </label></td>
    </tr>
     <tr>
      <td>Password:</td>
      <td colspan="2"><label>
        <input type="password" name="password" id="password" />
      </label></td>
    </tr>
    <tr>
      <td>Profile Picture:</td>
      <td colspan="2"><input type="file" name="picture" id="picture" /></td>
    </tr>
    <tr>
      <td colspan="3"><label>
        <input type="submit" name="submit" id="submit" value="REGISTER" />
        <input type="reset" name="reset" id="reset" value="CLEAR FORM" />
      </label></td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td colspan="2">&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td colspan="2">&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td colspan="2">&nbsp;</td>
    </tr>
    <tr>
      <td>&nbsp;</td>
      <td colspan="2">&nbsp;</td>
    </tr>
  </table>
</form>
</div>
</div>
</section>
</body>
</html>
